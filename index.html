<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Горбушка Онлайн</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f5f5f5;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #40a7e3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>
    <h1>📱 Горбушка Онлайн</h1>
    <div class="loader"></div>
    <p>Загрузка магазина...</p>
    
    <script>
        // Перенаправляем на правильную структуру
        setTimeout(() => {
            window.location.href = '/templates/index.html';
        }, 1500);
    </script>
</body>
</html>
