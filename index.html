<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Техно Маркет</title>
    <!-- Добавлен параметр v=2 для принудительного обновления кэша -->
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header>
        <!-- Градиентный заголовок -->
        <h1 class="gradient-text">📱 Техно Маркет</h1>
        <p id="user-greeting"></p>
    </header>

    <main>
        <section class="catalog">
            <h2>Каталог</h2>
            <div id="products-container" class="products-grid">
                <div class="loading">Загрузка товаров...</div>
            </div>
        </section>

        <section class="cart-section">
            <h2>Корзина <span id="cart-count" class="cart-count pulse">0</span></h2>
            <div id="cart-items"></div>
            <div id="cart-total" class="cart-total"></div>
        </section>
    </main>

    <!-- Добавлен параметр v=2 для скрипта -->
    <script src="script.js?v=2"></script>
</body>
</html>
